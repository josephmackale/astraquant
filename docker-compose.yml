services:
  engine:
    build:
      context: .
      dockerfile: ./engine/Dockerfile
    container_name: aq_engine
    restart: always
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1

      # V1 Observe + Logger
      - OBSERVE_ONLY=0
      - EXECUTION_ENABLED=1
      - AQ_LOG_DIR=/opt/astraquant/logs/v1

      # Keep your guards
      - SESSION_GUARD_LOSS_STREAK=6
      - SESSION_GUARD_LOSS_PAUSE_MIN=1
      - SESSION_GUARD_DD_USD=10
      - SESSION_GUARD_DD_PAUSE_MIN=2

    depends_on:
      ai:
        condition: service_healthy
      risk:
        condition: service_started
      api:
        condition: service_started
      db:
        condition: service_started
      redis:
        condition: service_started
      ws:
        condition: service_started

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "8001:8001"
      # If you want to block external hits (recommended), use this instead:
      # - "127.0.0.1:8001:8001"

    volumes:
      # Host path: ./logs/engine  -> Container path: /opt/astraquant/logs
      # V1 logs will land in: ./logs/engine/v1/*.jsonl
      - ./logs/engine:/opt/astraquant/logs
      - ./config:/opt/astraquant/config


  ai:
    build: ./ai
    container_name: aq_ai
    restart: always
    env_file: .env
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./logs/ai:/app/logs

  ws:
    build:
      context: ./ws
      dockerfile: Dockerfile
    container_name: aq_ws
    restart: always
    env_file: .env
    ports:
      - "8003:8003"
    volumes:
      - ./ws:/app
      - ./logs/ws:/app/logs

  risk:
    build: ./risk
    container_name: aq_risk
    restart: always
    env_file: .env
    ports:
      - "8004:8004"
    volumes:
      - ./logs/risk:/app/logs

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aq_api
    restart: always
    env_file: .env
    depends_on:
      - risk
    ports:
      - "8091:8000"
      # OAuth helper/callback listener (bind to localhost only; use SSH tunnel from your PC)
      - "127.0.0.1:8787:8787"
    volumes:
      - ./logs/api:/app/logs
      # Persist cTrader tokens/config across container restarts
      - ./config/ctrader:/app/config/ctrader
      - /opt/astraquant/config/ctrader:/opt/astraquant/config/ctrader


  nginx:
    build: ./nginx
    container_name: aq_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

  db:
    image: postgres:15
    container_name: aq_db
    restart: always
    env_file: .env
    volumes:
      - ./db/backups:/backups
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: aq_redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
